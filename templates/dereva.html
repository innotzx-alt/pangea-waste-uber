<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pangea Waste Uber - Dereva Panel</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h1 { color: #2ecc71; margin-bottom: 5px; font-size: 24px; }
        h2 { color: #aaaaaa; font-size: 14px; margin-top: 0; margin-bottom: 25px; }
        .order-card {
            background-color: #2d2d2d;
            border-left: 5px solid #2ecc71;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 6px;
            text-align: left;
        }
        .order-card p { margin: 5px 0; font-size: 15px; }
        .order-card strong { color: #2ecc71; }
        .btn-accept {
            background-color: #2ecc71;
            color: #121212;
            border: none;
            padding: 10px 15px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-size: 14px;
        }
        .btn-accept:hover { background-color: #27ae60; }
        .no-orders { color: #888888; font-style: italic; margin: 20px 0; }
        .refresh-btn {
            background-color: transparent;
            color: #2ecc71;
            border: 2px solid #2ecc71;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Pangea Waste Uber</h1>
        <h2>Driver Job Board - The Ghost Architect Engine</h2>
        
        <button class="refresh-btn" onclick="location.reload()">UPDATE ORDERS LIVE</button>

        <div id="orders-container">
            <div class="no-orders">Inatafuta order mpya mtaani...</div>
        </div>
    </div>

    <script>
        // Kazi ya kuvuta order zote kutoka kwenye safari.json ya seva
        async function vutaSafari() {
            try {
                // Kumbuka kwenye app.py yako, data zote za safari zinarudishwa kwenye api_omba_gari au unaweza kuziona
                // Hapa tunatengeneza muonekano wa mfano unaovuta data zako za safari
                const response = await fetch('/omba_gari', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({mteja: "Kuangalia", mtaa: "Mtaani", watu: 1, aina_huduma: "Kaya"}) });
                const data = await response.json();
                
                const container = document.getElementById('orders-container');
                if(data.data_ya_safari) {
                    container.innerHTML = `
                        <div class="order-card">
                            <p><strong>Mteja:</strong> ${data.data_ya_safari.mteja}</p>
                            <p><strong>Mtaa:</strong> ${data.data_ya_safari.mtaa}</p>
                            <p><strong>Tani za Taka (AI):</strong> ${data.data_ya_safari.tani_ai} Tani</p>
                            <p><strong>Gari Linalofaa:</strong> ${data.data_ya_safari.gari}</p>
                            <p><strong>Kamisheni Yako:</strong> ${data.data_ya_safari.kamisheni_tsh}</p>
                            <button class="btn-accept" onclick="acceptJob()">ACCEPT ORDER (CHUKUA KAZI)</button>
                        </div>
                    `;
                }
            } catch (error) {
                console.log("Bado huna order yoyote sokoni.");
            }
        }

        function acceptJob() {
            alert("Kazi Imekubaliwa! Nenda mtaani kuwahi mzigo mwanangu!");
            location.reload();
        }

        // Kimbiza mzigo ukurasa ukifunguka
        vutaSafari();
    </script>
</body>
</html>
