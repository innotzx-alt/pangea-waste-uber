<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pangea Waste Uber</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background-color: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #2ecc71; margin-bottom: 5px; }
        h2 { color: #aaaaaa; font-size: 14px; margin-top: 0; margin-bottom: 25px; }
        label { display: block; text-align: left; margin: 10px 0 5px; font-size: 14px; color: #bbbbbb; }
        input, select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #333; border-radius: 6px; background-color: #2d2d2d; color: #fff; box-sizing: border-box; font-size: 16px; }
        button { background-color: #2ecc71; color: #121212; border: none; padding: 12px; width: 100%; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #27ae60; }
        .result-box { margin-top: 20px; padding: 15px; background-color: #2d2d2d; border-radius: 6px; display: none; text-align: left; border-left: 5px solid #2ecc71; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Pangea Waste Uber</h1>
        <h2>The Ghost Architect Engine V1.0</h2>
        <form id="orderForm">
            <label for="mteja">Jina Lako:</label>
            <input type="text" id="mteja" name="mteja" placeholder="Andika jina lako" required>
            <label for="mtaa">Chagua Mtaa:</label>
            <select id="mtaa" name="mtaa" required>
                <option value="Torch">Torch</option>
                <option value="Soweto">Soweto</option>
                <option value="Majengo">Majengo</option>
                <option value="Pasua">Pasua</option>
            </select>
            <label for="watu">Idadi ya Watu Nyumbani:</label>
            <input type="number" id="watu" name="watu" value="4" min="1" required>
            <button type="submit" id="submitBtn">REQUEST A GARBAGE VEHICLE</button>
        </form>
        <div id="result" class="result-box"></div>
    </div>
    <script>
        document.getElementById('orderForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const resultBox = document.getElementById('result');
            submitBtn.innerText = "INATAFUTA GARI...";
            submitBtn.disabled = true;
            const data = {
                mteja: document.getElementById('mteja').value,
                mtaa: document.getElementById('mtaa').value,
                watu: parseInt(document.getElementById('watu').value)
            };
            try {
                const response = await fetch('/omba_gari', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if(result.status) {
                    const safari = result.data_ya_safari;
                    alert(`🚨 GARI LIMEPATIKANA!\nDereva wako ni ${safari.dereva} anakuja na ${safari.gari}!`);
                    resultBox.innerHTML = `
                        <p style="margin:0 0 10px 0; color:#2ecc71; font-weight:bold;">Taarifa za Safari:</p>
                        <p><strong>Dereva:</strong> ${safari.dereva}</p>
                        <p><strong>Simu:</strong> ${safari.simu_dereva}</p>
                        <p><strong>Gari:</strong> ${safari.gari}</p>
                        <p><strong>Tani (AI):</strong> ${safari.tani_ai} Tani</p>
                        <p><strong>Gharama:</strong> TSh ${safari.kamisheni_tsh}</p>
                    `;
                    resultBox.style.display = 'block';
                } else { alert("Kuna shida kidogo imetokea. Jaribu tena!"); }
            } catch (error) { alert("Imeshindwa kuunganisha kwenye seva!"); }
            finally { submitBtn.innerText = "REQUEST A GARBAGE VEHICLE"; submitBtn.disabled = false; }
        });
    </script>
</body>
</html>
